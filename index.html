<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Themabinti Services Hub</title>
    <style>
      .whatsapp-fab {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        text-decoration: none;
        font-family: inherit;
      }

      .whatsapp-fab__label {
        max-width: 0;
        overflow: hidden;
        white-space: nowrap;
        opacity: 0;
        transform: translateX(10px);
        transition: max-width 220ms ease, opacity 220ms ease, transform 220ms ease;
        background: rgba(15, 23, 42, 0.92);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        padding: 10px 14px;
        box-shadow: 0 16px 40px rgba(2, 6, 23, 0.22);
        backdrop-filter: blur(12px);
      }

      .whatsapp-fab__label-title {
        display: block;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.1;
      }

      .whatsapp-fab__label-subtitle {
        display: block;
        margin-top: 3px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.1;
      }

      .whatsapp-fab__button {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background:
          radial-gradient(circle at 30% 30%, #49f58c 0%, #25d366 55%, #128c4a 100%);
        box-shadow:
          0 18px 38px rgba(18, 140, 74, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        transform: translateY(0) scale(1);
        transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
        overflow: visible;
      }

      .whatsapp-fab__button::before,
      .whatsapp-fab__button::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
      }

      .whatsapp-fab__button::before {
        background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0));
        inset: 1px;
      }

      .whatsapp-fab__button::after {
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .whatsapp-fab__pulse,
      .whatsapp-fab__pulse::before {
        position: absolute;
        inset: -8px;
        border-radius: 999px;
        border: 1px solid rgba(37, 211, 102, 0.24);
        animation: whatsapp-pulse 2.8s ease-out infinite;
      }

      .whatsapp-fab__pulse::before {
        content: "";
        animation-delay: 1.2s;
      }

      .whatsapp-fab__icon {
        position: relative;
        z-index: 1;
        width: 30px;
        height: 30px;
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.16));
      }

      .whatsapp-fab:hover .whatsapp-fab__label,
      .whatsapp-fab:focus-visible .whatsapp-fab__label {
        max-width: 180px;
        opacity: 1;
        transform: translateX(0);
      }

      .whatsapp-fab:hover .whatsapp-fab__button,
      .whatsapp-fab:focus-visible .whatsapp-fab__button {
        transform: translateY(-4px) scale(1.04);
        box-shadow:
          0 24px 48px rgba(18, 140, 74, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        filter: saturate(1.05);
      }

      .whatsapp-fab:focus-visible {
        outline: none;
      }

      .whatsapp-fab:focus-visible .whatsapp-fab__button {
        box-shadow:
          0 24px 48px rgba(18, 140, 74, 0.4),
          0 0 0 4px rgba(37, 211, 102, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }

      @keyframes whatsapp-pulse {
        0% {
          opacity: 0.7;
          transform: scale(0.9);
        }
        70% {
          opacity: 0;
          transform: scale(1.28);
        }
        100% {
          opacity: 0;
          transform: scale(1.28);
        }
      }

      @media (max-width: 640px) {
        .whatsapp-fab {
          right: 14px;
          bottom: 14px;
        }

        .whatsapp-fab__button {
          width: 58px;
          height: 58px;
        }

        .whatsapp-fab__icon {
          width: 28px;
          height: 28px;
        }

        .whatsapp-fab__label {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .whatsapp-fab__label,
        .whatsapp-fab__button {
          transition: none;
        }

        .whatsapp-fab__pulse,
        .whatsapp-fab__pulse::before {
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <a
      class="whatsapp-fab"
      href="https://wa.me/254712161506"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Chat on WhatsApp"
    >
      <span class="whatsapp-fab__label" aria-hidden="true">
        <span class="whatsapp-fab__label-title">Chat on WhatsApp</span>
        <span class="whatsapp-fab__label-subtitle">Fast replies from Themabinti</span>
      </span>
      <span class="whatsapp-fab__button">
        <span class="whatsapp-fab__pulse"></span>
      <svg
        class="whatsapp-fab__icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >

      </svg>
      </span>
    </a>
  </body>
</html>
